<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileOnCanvas</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #333;
            color: #fff;
        }

        button {
            border: none;
            outline: 2px solid transparent;
            padding: 12px 32px;
            border-radius: 1024px;
            background: #fff;
            color: #333;
            font-size: 16px;
            transition: 0.2s;
        }

        button:hover {
            background: #ccc;
            transition: 0.2s;
        }

        button:active {
            background: #666;
            color: #fff;
            outline: 2px solid #fff;
            transition: 0s;
        }

        input:not([type="range"]) {
            padding: 8px;
            background: #ccc;
            border: none;
            outline: 2px solid transparent;
            transition: 0.2s;
        }

        input:not([type="range"]):hover {
            outline: 2px solid #fff;
            transition: 0s;
        }

        input:not([type="range"]):focus {
            background: #666;
            color: #fff;
            outline: 2px solid #fff;
            transform: scale(1.2);
            transition: 0.2s;
        }

        #drag_overlay {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #333;
            font-size: 24px;
            transition: 0.2s;
            pointer-events: none;
            opacity: 0;
        }

        .drag-overlay-content {
            position: absolute;
            left: 16px;
            top: 16px;
            width: calc(100% - 32px);
            height: calc(100% - 32px);
            display: grid;
            align-content: center;
            justify-content: center;
            border: 2px dashed #fff;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div style="text-align: center;">
        <h1 style="margin: 32px 0 16px 0;">FileOnCanvas</h1>
        <div style="margin-bottom: 16px;">
            <button onclick="selectFile();" style="margin: 8px 16px;">选择文件</button>
            <button onclick="togglePaused();" style="margin: 8px 16px;" id="btn_play">播放</button>
            <button onclick="saveFrame();" style="margin: 8px 16px;">保存帧</button>
            <button onclick="toggleFullScreen();" style="margin: 8px 16px;">切换全屏</button>
            <div style="margin-top: 16px;">
                <div style="display: inline-block;vertical-align: middle;">载入帧：</div>
                <input type="number" id="input_frame"
                    style="display: inline-block;vertical-align: middle;border-radius: 1024px;width: 80px;">
            </div>
            <div style="margin-top: 16px;">
                <div style="display: inline-block;vertical-align: middle;">Canvas 尺寸：</div>
                <input type="number" id="input_width"
                    style="display: inline-block;vertical-align: middle;border-radius: 1024px 0 0 1024px;width: 80px;">
                <input type="number" id="input_height"
                    style="display: inline-block;vertical-align: middle;border-radius: 0 1024px 1024px 0;width: 80px;">
            </div>
        </div>
        <p style="text-align: center;margin: 16px 0;" id="log"></p>
        <canvas id="canvas" style="background: #000;"></canvas>
        <p style="text-align: center;margin: 32px 0;">Made by Burger Studio.</p>
        <div id="drag_overlay">
            <div class="drag-overlay-content">释放鼠标导入文件</div>
        </div>
    </div>
    <script>
        // 这是一堆变量
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let frames = [];
        let chunkSize;
        let chunkLength;
        const input_frame = document.getElementById('input_frame');
        const input_width = document.getElementById('input_width');
        const input_height = document.getElementById('input_height');
        const btn_play = document.getElementById('btn_play');
        let currentFrame = 0;
        let currentFile;
        let paused = true;
        // 开局（什么鬼）自动初始化 Canvas
        onload = function () {
            canvas.width = window.innerWidth / 2;
            canvas.height = window.innerHeight / 2;
            input_width.value = canvas.width;
            input_height.value = canvas.height;
            printLog(`Canvas 初始化（${canvas.width} * ${canvas.height}）\n请选择一个文件来播放（任意格式）\n支持拖拽或粘贴导入\n使用空格键暂停，方向键翻页`);
            chunkSize = canvas.width * canvas.height * 3;
        }
        // 选择文件并读取
        function selectFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = function () {
                const file = this.files[0];
                readFile(file);
            };
            input.click();
        }
        function readFile(file, log = true) {
            currentFile = file;
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = function () {
                frames = [];
                const buffer = reader.result;
                const bytes = new Uint8Array(buffer);
                chunkLength = Math.ceil(bytes.length / chunkSize);
                for (let i = 0; i < chunkLength; i++) {
                    frames.push(bytes.slice(i * chunkSize, (i + 1) * chunkSize));
                }
                if (log) {
                    printLog(`文件读取成功，共 ${frames.length} 帧\n点击“播放”以开始`);
                }
                currentFrame = 0;
                paused = false;
                loadFrame(0, false, false);
                paused = true;
            }
        }
        // 载入帧
        function loadFrame(index, consistent = true, log = true) {
            if (frames.length === 0) {
                printLog('请先选择文件');
                return;
            }
            if (paused) return;
            // 自动重播
            if (consistent && currentFrame + 1 == frames.length) {
                index = 0;
            }
            currentFrame = index;
            input_frame.value = currentFrame + 1;
            let imgData = ctx.createImageData(canvas.width, canvas.height);
            let data = [];
            frames[index].forEach((item, index) => {
                data.push(item);
                if ((index + 1) % 3 == 0) {
                    data.push(255);
                }
            });
            let fullSize = canvas.width * canvas.height * 4;
            if (data.length < fullSize) {
                let padding = fullSize - data.length;
                let startIndex = data.length;
                for (let i = 0; i < padding; i++) {
                    if ((i + 1 + startIndex) % 4 == 0) {
                        data.push(255);
                    } else {
                        data.push(0);
                    }
                }
            }
            imgData.data.set(data);
            ctx.putImageData(imgData, 0, 0);
            if (log) {
                printLog(`播放（${String(index + 1).padStart(frames.length.toString().length, '0')} / ${frames.length}）`);
            }
            if (consistent) {
                if (index + 1 < frames.length) {
                    setTimeout(() => {
                        loadFrame(index + 1);
                    }, 1000 / 60);
                } else {
                    // 播完暂停
                    togglePaused();
                }
            }
        }
        // 打印日志
        function printLog(msg) {
            console.log(`[${new Date().toLocaleString()}] ` + msg);
            document.getElementById('log').innerText = msg;
        }
        // 保存帧
        function saveFrame() {
            if (frames.length === 0) {
                printLog('请先选择文件');
                return;
            }
            const link = document.createElement('a');
            link.download = `frame_${currentFrame + 1}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            printLog(`保存帧（${currentFrame + 1} / ${frames.length}）`);
        }
        // 载入帧（静态）
        input_frame.addEventListener('input', function () {
            if (frames.length === 0) {
                printLog('请先选择文件');
                return;
            }
            const index = parseInt(this.value) - 1;
            if (index >= 0 && index < frames.length) {
                paused = false;
                loadFrame(index, false);
                paused = true;
            } else {
                printLog(`请输入有效的帧序号（1 - ${frames.length}）`);
            }
        });
        // 调整 Canvas 尺寸
        input_width.addEventListener('input', function () {
            if (this.value <= 0) {
                printLog('请输入有效的宽度值');
                return;
            }
            canvas.width = this.value;
            chunkSize = canvas.width * canvas.height * 3;
            printLog(`Canvas 尺寸更新（${canvas.width} * ${canvas.height}）`);
            readFile(currentFile, false);
        });
        input_height.addEventListener('input', function () {
            if (this.value <= 0) {
                printLog('请输入有效的高度值');
                return;
            }
            canvas.height = this.value;
            chunkSize = canvas.width * canvas.height * 3;
            printLog(`Canvas 尺寸更新（${canvas.width} * ${canvas.height}）`);
            readFile(currentFile, false);
        });
        // 切换全屏
        function toggleFullScreen() {
            canvas.requestFullscreen();
        }
        // 键盘操作
        // 空格键播放/暂停
        document.addEventListener('keydown', function (event) {
            if (event.code === 'Space' && !event.target.closest('input')) {
                togglePaused();
            }
        });
        function togglePaused() {
            if (frames.length === 0) {
                printLog('请先选择文件');
                return;
            }
            if (paused) {
                paused = false;
                loadFrame(currentFrame);
                btn_play.innerText = '暂停';
            } else {
                paused = true;
                btn_play.innerText = '播放';
            }
        }
        // 方向键翻页
        function prevFrame() {
            if (frames.length === 0) {
                printLog('请先选择文件');
                return;
            }
            if (currentFrame - 1 >= 0) {
                paused = false;
                loadFrame(currentFrame - 1, false);
                paused = true;
            }
        }
        function nextFrame() {
            if (frames.length === 0) {
                printLog('请先选择文件');
                return;
            }
            if (currentFrame + 1 < frames.length) {
                paused = false;
                loadFrame(currentFrame + 1, false);
                paused = true;
            }
        }
        document.addEventListener('keydown', function (event) {
            if (event.code === 'ArrowLeft' && !event.target.closest('input')) {
                prevFrame();
            } else if (event.code === 'ArrowRight' && !event.target.closest('input')) {
                nextFrame();
            } else if (event.code === 'ArrowUp' && !event.target.closest('input')) {
                prevFrame();
            } else if (event.code === 'ArrowDown' && !event.target.closest('input')) {
                nextFrame();
            }
        });
        // 拖放导入
        document.addEventListener('dragover', function (e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById("drag_overlay").style.opacity = 1;
        }, false);
        document.addEventListener('drop', function (e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById("drag_overlay").style.opacity = 0;
            var files = e.dataTransfer.files;
            if (files.length > 0) {
                var file = files[0];
                readFile(file);
            }
        }, false);
        document.addEventListener('dragleave', function (e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById("drag_overlay").style.opacity = 0;
        });
        // 从剪贴板粘贴
        document.addEventListener('paste', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var item = e.clipboardData.items[0];
            readFile(item.getAsFile());
        });
    </script>
</body>

</html>
